<h2>动画应用的范围？</h2>
<p class="subtitle">哪些区域需要这些动画效果</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>全站应用</h3>
      <p>所有板块都加入动画效果，整体感强，但改动范围大</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>Hero + 作品卡片</h3>
      <p>只在首屏和作品展示区加入，聚焦视觉冲击</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>仅 Hero 区域</h3>
      <p>首屏专用，保持克制，不干扰内容阅读</p>
    </div>
  </div>
</div>

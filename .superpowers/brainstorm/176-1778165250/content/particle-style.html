<h2>你希望哪种粒子风格？</h2>
<p class="subtitle">粒子的大小、形态和运动轨迹决定整体氛围</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>细碎光点</h3>
      <p>微小的发光粒子，缓慢漂浮，轻盈梦幻感，类似星空</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>几何图形</h3>
      <p>三角形、圆形等几何形状，缓慢旋转飘动，现代科技感</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>柔和光斑</h3>
      <p>较大面积的模糊光斑，缓慢流动，温暖舒适的氛围</p>
    </div>
  </div>
</div>
